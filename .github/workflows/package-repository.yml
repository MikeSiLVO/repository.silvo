name: Package Repository Addon

on:
  push:
    branches: [ main, master ]
    paths:
      - 'repository.silvo/**'
  workflow_dispatch:

jobs:
  package:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Package repository addon
        run: |
          python _package_addon.py repository.silvo/
          echo "✓ Repository addon packaged"

      - name: Commit and push changes
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add repository.silvo-1.0.0.zip

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            VERSION=$(python3 -c "import xml.etree.ElementTree as ET; print(ET.parse('repository.silvo/addon.xml').getroot().get('version'))")
            git commit -m "Update repository.silvo-${VERSION}.zip"
            git push
            echo "✓ Pushed repository addon package"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
